<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>머니플로우 — 현금흐름 예측</title>
<meta name="theme-color" content="#0E7A63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="머니플로우">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.syncdot{font-size:10.5px;font-weight:650;padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-3);cursor:pointer;align-self:center;white-space:nowrap;border:none}
.syncdot.ok{color:var(--pos);background:var(--pos-soft)}
.syncdot.saving{color:var(--warn);background:var(--warn-soft)}
.syncdot.err{color:var(--neg);background:var(--neg-soft)}
.gate{position:fixed;inset:0;z-index:100;background:var(--ground);overflow-y:auto;-webkit-overflow-scrolling:touch}
.gate input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:var(--raise);color:var(--ink);outline:none;font-size:16px;font-family:var(--ui)}
.gate input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.gate h1{font-weight:700}
</style>
</head>
<body>

<style>
  :root{
    --ground:#F2F4F3; --surface:#FFFFFF; --surface-2:#EAEDEB; --raise:#FBFCFB;
    --ink:#151A18; --ink-2:#586460; --ink-3:#8B948F; --line:#E2E6E3;
    --accent:#0E7A63; --accent-2:#0B6553; --accent-soft:#D9ECE5;
    --pos:#1B9A5F; --pos-soft:#DBF0E4;
    --neg:#D9564A; --neg-soft:#F7E1DE;
    --warn:#B77A12; --warn-soft:#F5E9CF;
    --gold:#B08420; --gold-soft:#F4EAD0;
    --mono:"SF Mono","Cascadia Code","Consolas","Roboto Mono",ui-monospace,monospace;
    --ui:"Pretendard","Pretendard Variable","Apple SD Gothic Neo","Noto Sans KR","Noto Sans CJK KR",-apple-system,"Malgun Gothic",system-ui,sans-serif;
    --shadow:0 1px 2px rgba(20,30,26,.05),0 6px 20px rgba(20,30,26,.06);
    --shadow-lg:0 8px 40px rgba(20,30,26,.16);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#0D1210; --surface:#151B18; --surface-2:#1E2622; --raise:#1A211D;
      --ink:#E9EEEB; --ink-2:#9AA6A0; --ink-3:#69736D; --line:#28312C;
      --accent:#38CC9F; --accent-2:#2FB68C; --accent-soft:#12332A;
      --pos:#3ACB84; --pos-soft:#132E20;
      --neg:#EB6A5C; --neg-soft:#33201D;
      --warn:#D69A34; --warn-soft:#322817;
      --gold:#D9B15A; --gold-soft:#2E2814;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
      --shadow-lg:0 12px 48px rgba(0,0,0,.55);
    }
  }
  :root[data-theme="light"]{
    --ground:#F2F4F3; --surface:#FFFFFF; --surface-2:#EAEDEB; --raise:#FBFCFB;
    --ink:#151A18; --ink-2:#586460; --ink-3:#8B948F; --line:#E2E6E3;
    --accent:#0E7A63; --accent-2:#0B6553; --accent-soft:#D9ECE5;
    --pos:#1B9A5F; --pos-soft:#DBF0E4; --neg:#D9564A; --neg-soft:#F7E1DE;
    --warn:#B77A12; --warn-soft:#F5E9CF; --gold:#B08420; --gold-soft:#F4EAD0;
    --shadow:0 1px 2px rgba(20,30,26,.05),0 6px 20px rgba(20,30,26,.06);
    --shadow-lg:0 8px 40px rgba(20,30,26,.16);
  }
  :root[data-theme="dark"]{
    --ground:#0D1210; --surface:#151B18; --surface-2:#1E2622; --raise:#1A211D;
    --ink:#E9EEEB; --ink-2:#9AA6A0; --ink-3:#69736D; --line:#28312C;
    --accent:#38CC9F; --accent-2:#2FB68C; --accent-soft:#12332A;
    --pos:#3ACB84; --pos-soft:#132E20; --neg:#EB6A5C; --neg-soft:#33201D;
    --warn:#D69A34; --warn-soft:#322817; --gold:#D9B15A; --gold-soft:#2E2814;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
    --shadow-lg:0 12px 48px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--ground);color:var(--ink);font-family:var(--ui);
    -webkit-font-smoothing:antialiased;line-height:1.45}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--ground);
    position:relative;display:flex;flex-direction:column}
  @media (min-width:520px){
    .app{margin:24px auto;min-height:calc(100vh - 48px);border-radius:28px;
      box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--line)}
  }
  .scroll{flex:1;overflow-y:auto;padding:0 16px 108px}
  .topbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--ground) 86%,transparent);
    backdrop-filter:blur(12px);padding:16px 16px 10px;display:flex;align-items:baseline;
    justify-content:space-between;border-bottom:1px solid transparent}
  .topbar.stuck{border-color:var(--line)}
  .topbar .ttl{font-size:20px;font-weight:700}
  .topbar .sub{font-size:12px;color:var(--ink-3)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:16px;box-shadow:var(--shadow);margin-top:12px}
  .card.pad0{padding:0;overflow:hidden}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:650}
  .hero-num{font-size:34px;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-top:4px}
  .row{display:flex;align-items:center;gap:10px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .muted{color:var(--ink-2)} .dim{color:var(--ink-3)}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .accent{color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:3px 9px;border-radius:999px;background:var(--surface-2);color:var(--ink-2)}
  .chip.pos{background:var(--pos-soft);color:var(--pos)}
  .chip.neg{background:var(--neg-soft);color:var(--neg)}
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.accent{background:var(--accent-soft);color:var(--accent)}
  .divider{height:1px;background:var(--line);margin:12px -16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .li{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .li:last-child{border-bottom:none}
  .li .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    font-size:17px;background:var(--surface-2);flex:none}
  .li .grow{flex:1;min-width:0}
  .li .nm{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li .meta{font-size:12px;color:var(--ink-3);margin-top:1px}
  .li .amt{font-weight:650;font-size:14.5px;white-space:nowrap}
  .li.tap{cursor:pointer} .li.tap:active{background:var(--surface-2)}
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 2px}
  .sec-h h3{font-size:15px}
  .addbtn{font-size:13px;font-weight:650;color:var(--accent);padding:6px 10px;border-radius:9px}
  .addbtn:active{background:var(--accent-soft)}
  .empty{text-align:center;color:var(--ink-3);font-size:13px;padding:26px 10px}
  .nav{position:absolute;left:0;right:0;bottom:0;display:flex;background:color-mix(in srgb,var(--surface) 92%,transparent);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:6px 3px calc(6px + env(safe-area-inset-bottom))}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:7px 1px;border-radius:12px;color:var(--ink-3);font-size:10px;font-weight:600}
  .nav button svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.7;fill:none}
  .nav button.on{color:var(--accent)}
  .nav button.on svg{stroke-width:2}
  .seg{display:flex;background:var(--surface-2);border-radius:11px;padding:3px;gap:2px}
  .seg button{flex:1;padding:7px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink-2)}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .tl-day{display:flex;gap:12px;padding:2px 0}
  .tl-date{width:52px;flex:none;text-align:right;padding-top:11px}
  .tl-date .d{font-size:16px;font-weight:700;line-height:1}
  .tl-date .m{font-size:10.5px;color:var(--ink-3)}
  .tl-line{position:relative;width:14px;flex:none;display:flex;justify-content:center}
  .tl-line::before{content:"";position:absolute;top:0;bottom:0;width:2px;background:var(--line)}
  .tl-dot{width:11px;height:11px;border-radius:50%;background:var(--ink-3);margin-top:13px;z-index:1;border:2px solid var(--surface)}
  .tl-body{flex:1;padding:6px 0 14px}
  .tl-ev{display:flex;justify-content:space-between;gap:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;padding:9px 12px;margin-bottom:6px;box-shadow:var(--shadow)}
  .tl-bal{font-size:11.5px;color:var(--ink-3);padding-left:2px}
  .scrim{position:fixed;inset:0;background:rgba(10,16,14,.44);z-index:50;opacity:0;
    pointer-events:none;transition:opacity .22s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;
    background:var(--surface);border-radius:22px 22px 0 0;padding:8px 18px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(102%);transition:transform .26s cubic-bezier(.3,.8,.3,1);max-height:92%;overflow-y:auto}
  .scrim.open .sheet{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 6px}
  .sheet h2{font-size:18px;margin:6px 2px 14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:650;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px 13px;border:1px solid var(--line);
    border-radius:11px;background:var(--raise);color:var(--ink);outline:none}
  .field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field .hint{font-size:11.5px;color:var(--ink-3);margin-top:5px}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .kindtog{display:flex;gap:8px}
  .kindtog button{flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--line);
    font-weight:650;font-size:13.5px;color:var(--ink-2);background:var(--raise)}
  .kindtog button.on-pos{border-color:var(--pos);background:var(--pos-soft);color:var(--pos)}
  .kindtog button.on-neg{border-color:var(--neg);background:var(--neg-soft);color:var(--neg)}
  .btn{display:block;width:100%;padding:14px;border-radius:13px;background:var(--accent);
    color:#fff;font-weight:700;font-size:15px;margin-top:6px}
  .btn:active{background:var(--accent-2)}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);margin-top:9px}
  .btn.danger{background:var(--neg-soft);color:var(--neg)}
  :root[data-theme="dark"] .btn:not(.ghost):not(.danger){color:#08130F}
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .btn:not(.ghost):not(.danger){color:#08130F}}
  .catrow{display:flex;flex-wrap:wrap;gap:7px}
  .catrow button{padding:8px 13px;border-radius:10px;border:1px solid var(--line);
    background:var(--raise);font-size:13px;font-weight:600;color:var(--ink-2)}
  .catrow button.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .warn-banner{display:flex;gap:10px;align-items:flex-start;background:var(--warn-soft);
    border:1px solid color-mix(in srgb,var(--warn) 30%,transparent);border-radius:14px;padding:12px 14px;margin-top:12px}
  .warn-banner .wt{font-weight:700;color:var(--warn);font-size:13.5px}
  .warn-banner .wd{font-size:12.5px;color:var(--ink-2);margin-top:2px}
  .ok-banner{display:flex;gap:10px;align-items:center;background:var(--pos-soft);
    border:1px solid color-mix(in srgb,var(--pos) 28%,transparent);border-radius:14px;padding:12px 14px;margin-top:12px}
  .ok-banner .wt{font-weight:700;color:var(--pos);font-size:13.5px}
  .slider{width:100%;margin:8px 0 2px;accent-color:var(--accent)}
  .barwrap{height:7px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin-top:8px}
  .bar{height:100%;background:var(--accent);border-radius:4px}
  .toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--ground);padding:10px 18px;border-radius:999px;font-size:13px;
    font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  svg .grid{stroke:var(--line)}
  .legend{display:flex;gap:14px;font-size:11.5px;color:var(--ink-2);margin-top:8px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
  /* inline calc inputs */
  .inrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .inrow:last-child{border-bottom:none}
  .inrow>label{font-size:13px;color:var(--ink-2);font-weight:600;flex:none}
  .inrow input,.inrow select{width:56%;text-align:right;padding:9px 11px;border:1px solid var(--line);
    border-radius:10px;background:var(--raise);color:var(--ink);outline:none;font-family:var(--mono);
    font-variant-numeric:tabular-nums;font-weight:600}
  .inrow input:focus,.inrow select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .resrow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:8px 0}
  .resrow .rk{font-size:13px;color:var(--ink-2)}
  .resrow .rk small{display:block;color:var(--ink-3);font-size:11px;font-weight:400;margin-top:1px}
  .resrow .rv{font-weight:650}
  /* share table */
  .stbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
  .stbl th,.stbl td{border:1px solid var(--line);padding:6px 4px;text-align:center;font-variant-numeric:tabular-nums}
  .stbl th{background:var(--surface-2);color:var(--ink-2);font-weight:650;font-size:11px}
  .stbl td.yr{color:var(--ink-3);font-weight:600}
  .stbl td.hit{background:var(--gold-soft);color:var(--gold);font-weight:800;outline:2px solid var(--gold);position:relative;z-index:1}
  .stbl td.colon{background:color-mix(in srgb,var(--accent-soft) 55%,transparent)}
</style>

<div class="app" id="app">
  <div class="topbar" id="topbar">
    <div><div class="ttl" id="pageTitle">홈</div></div>
    <div class="sub mono" id="pageDate"></div>
  </div>
  <div class="scroll" id="scroll"></div>
  <nav class="nav" id="nav"></nav>
  <div class="toast" id="toast"></div>
</div>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>

<script>
"use strict";
const KEY="moneyflow.v2";
const todayISO=()=>new Date().toISOString().slice(0,10);
function defaultState(){
  const t=todayISO();
  return {
    baseCash:5200000, baseDate:t,
    recurring:[
      {id:id(),name:"월급",kind:"income",cat:"급여",freq:"monthly",day:25,start:t,end:"2100-01-01",bank:"국민",account:"",segs:[{from:t,amount:3200000}]},
      {id:id(),name:"월세",kind:"expense",cat:"주거",freq:"monthly",day:5,start:t,end:"2100-01-01",bank:"신한 자동이체",account:"110-***-4567",segs:[{from:t,amount:550000}]},
      {id:id(),name:"통신+구독",kind:"expense",cat:"구독",freq:"monthly",day:15,start:t,end:"2100-01-01",bank:"카카오뱅크 자동이체",account:"3333-**-1234",segs:[{from:t,amount:120000}]},
      {id:id(),name:"생활비",kind:"expense",cat:"생활",freq:"monthly",day:1,start:t,end:"2100-01-01",bank:"",account:"",segs:[{from:t,amount:900000}]},
      {id:id(),name:"자동차세",kind:"expense",cat:"세금",freq:"yearly",day:16,month:6,start:t,end:"2100-01-01",bank:"",account:"",segs:[{from:t,amount:520000}]},
    ],
    oneoff:[
      {id:id(),name:"경조사",kind:"expense",cat:"기타",date:addDaysISO(t,12),amount:200000},
      {id:id(),name:"성과급",kind:"income",cat:"급여",date:addDaysISO(t,48),amount:1500000},
    ],
    loans:[
      {id:id(),name:"신용대출",principal:24000000,rate:5.4,payment:800000,day:10,start:t,end:"2100-01-01"},
    ],
    stocks:[
      {id:id(),name:"국내 ETF",cost:6000000,target:12,actual:6850000,date:addDaysISO(t,-200)},
      {id:id(),name:"미국주식",cost:4000000,target:15,actual:3600000,date:addDaysISO(t,-120)},
      {id:id(),name:"연금저축(적립)",cost:12000000,target:6,actual:"",date:addDaysISO(t,-400)},
    ],
    realestate:{acquire:640000000,loanBase:620000000,ltv:50,rate:1.3,term:30,baseYear:2027,sellYear:2032,salePrice:1300000000},
  };
}
function id(){return Math.random().toString(36).slice(2,9)}
let S=migrate(load());
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):defaultState()}catch(e){return defaultState()}}
function save(){localStorage.setItem(KEY,JSON.stringify(S));if(typeof schedulePush==="function"&&!applying)schedulePush();}
function migrate(s){
  if(!s.realestate)s.realestate=defaultState().realestate;
  if(s.realestate.loanBase===undefined)s.realestate.loanBase=s.realestate.loan&&s.realestate.ltv?Math.round(s.realestate.loan/(s.realestate.ltv/100)):620000000;
  (s.stocks||[]).forEach(x=>{if(x.target===undefined)x.target=0;if(x.actual===undefined)x.actual=(x.value!==undefined?x.value:"")});
  (s.recurring||[]).forEach(r=>{if(r.bank===undefined)r.bank="";if(r.account===undefined)r.account=""});
  return s;
}

/* dates */
function parseISO(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function toISO(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDaysISO(s,n){const d=parseISO(s);d.setDate(d.getDate()+n);return toISO(d)}
function addMonths(dt,n){const d=new Date(dt);d.setMonth(d.getMonth()+n);return d}
function daysBetween(a,b){return Math.round((parseISO(b)-parseISO(a))/86400000)}
function clampDay(y,m,day){const last=new Date(y,m+1,0).getDate();return Math.min(day,last)}
const MON=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
function fmtDateK(s){const d=parseISO(s);return(d.getMonth()+1)+"월 "+d.getDate()+"일"}
function fmtDateFull(s){const d=parseISO(s);return d.getFullYear()+"년 "+(d.getMonth()+1)+"월 "+d.getDate()+"일"}
function fmtDateShort(s){const d=parseISO(s);return(d.getMonth()+1)+"/"+d.getDate()}
function won(n){const s=Math.round(Math.abs(n)).toLocaleString("en-US");return(n<0?"-":"")+"₩"+s}
function wonSigned(n){const s=Math.round(Math.abs(n)).toLocaleString("en-US");return(n<0?"−":"+")+"₩"+s}
function manLabel(n){const v=n/10000;if(Math.abs(v)>=10000)return(v/10000).toFixed(1)+"억";return Math.round(v).toLocaleString("en-US")+"만"}
function eok(n){return(n/100000000).toFixed(2)+"억"}

/* projection */
function effAmount(item,iso){let a=item.segs[0].amount;for(const s of item.segs){if(s.from<=iso)a=s.amount}return a}
function catIcon(cat){return({급여:"💰",주거:"🏠",구독:"📺",생활:"🛒",세금:"🧾",교통:"🚗",보험:"🛡️",통신:"📱",대출:"🏦",주식:"📈",기타:"✦",저축:"🐷",의료:"🏥",교육:"📚",모임:"🎉"})[cat]||"✦"}
function stockValue(s){const a=s.actual;const has=(a!==""&&a!==undefined&&a!==null);return has?(+a):Math.round((+s.cost||0)*(1+(+s.target||0)/100))}
function occurrences(item,from,to){
  const out=[];const start=item.start>from?item.start:from;
  if(item.end<from)return out;
  const end=item.end<to?item.end:to;
  if(item.freq==="monthly"||item.freq==="quarterly"||item.freq==="yearly"){
    let d=parseISO(from);d.setDate(1);
    for(let i=0;i<520;i++){
      const y=d.getFullYear(),m=d.getMonth();
      if(item.freq==="yearly"&&(m+1)!==(item.month||1)){d=addMonths(d,1);continue}
      if(item.freq==="quarterly"){const anchorM=parseISO(item.start).getMonth();
        if(((m-anchorM)%3+3)%3!==0){d=addMonths(d,1);continue}}
      const iso=toISO(new Date(y,m,clampDay(y,m,item.day)));
      if(iso>=start&&iso<=end&&iso>=from&&iso<=to)out.push({date:iso,amount:effAmount(item,iso)});
      d=addMonths(d,1);if(toISO(d)>to)break;
    }
  }else if(item.freq==="biweekly"){
    let iso=item.start;while(iso<from)iso=addDaysISO(iso,14);
    while(iso<=end){if(iso>=from)out.push({date:iso,amount:effAmount(item,iso)});iso=addDaysISO(iso,14)}
  }
  return out;
}
function loanPayments(loan,from,to){
  const out=[];const start=loan.start>from?loan.start:from;const end=loan.end<to?loan.end:to;
  let d=parseISO(from);d.setDate(1);
  for(let i=0;i<520;i++){const y=d.getFullYear(),m=d.getMonth();
    const iso=toISO(new Date(y,m,clampDay(y,m,loan.day)));
    if(iso>=start&&iso<=end&&iso>=from&&iso<=to)out.push({date:iso,amount:loan.payment});
    d=addMonths(d,1);if(toISO(d)>to)break;}
  return out;
}
function loanRemainingAt(loan,iso){
  let bal=loan.principal;const mRate=(loan.rate||0)/100/12;
  const pays=loanPayments(loan,loan.start,iso);
  for(const p of pays){const interest=bal*mRate;let princ=p.amount-interest;
    if(princ<0)princ=0;if(princ>bal)princ=bal;bal-=princ;if(bal<=0){bal=0;break}}
  return bal;
}
function loanRemainingNow(loan){return loanRemainingAt(loan,S.baseDate)}
function totalStockValue(){return S.stocks.reduce((a,s)=>a+stockValue(s),0)}
function netNow(){return S.baseCash+totalStockValue()-S.loans.reduce((a,l)=>a+loanRemainingNow(l),0)}
function buildSeries(months,scenario){
  scenario=scenario||{inc:0,exp:0};
  const from=S.baseDate,to=toISO(addMonths(parseISO(S.baseDate),months));
  const map={};const push=(iso,amt)=>{if(iso<from||iso>to)return;map[iso]=(map[iso]||0)+amt};
  for(const r of S.recurring){const sign=r.kind==="income"?1:-1;for(const o of occurrences(r,from,to))push(o.date,sign*o.amount)}
  for(const o of S.oneoff){if(o.date>from&&o.date<=to)push(o.date,(o.kind==="income"?1:-1)*o.amount)}
  for(const l of S.loans){for(const p of loanPayments(l,from,to))if(p.date>from)push(p.date,-p.amount)}
  if(scenario.inc||scenario.exp){let d=addMonths(parseISO(from),1);d.setDate(1);
    while(toISO(d)<=to){push(toISO(d),scenario.inc-scenario.exp);d=addMonths(d,1)}}
  const totalStock=totalStockValue();
  const pts=[];let cash=S.baseCash,minCash=cash,minDate=from,firstNeg=null;
  const nDays=daysBetween(from,to);
  for(let i=0;i<=nDays;i++){const iso=addDaysISO(from,i);if(i>0&&map[iso])cash+=map[iso];
    const debt=S.loans.reduce((a,l)=>a+loanRemainingAt(l,iso),0);
    pts.push({date:iso,cash,net:cash+totalStock-debt});
    if(cash<minCash){minCash=cash;minDate=iso}if(cash<0&&!firstNeg)firstNeg=iso;}
  return {pts,minCash,minDate,firstNeg,totalStock};
}
function projectTo(targetISO){
  if(targetISO<=S.baseDate)return {cash:S.baseCash,net:netNow(),date:S.baseDate};
  const months=Math.ceil(daysBetween(S.baseDate,targetISO)/30)+2;
  const s=buildSeries(months,{});const p=s.pts.find(x=>x.date===targetISO);
  return p?{cash:p.cash,net:p.net,date:targetISO}:{...s.pts[s.pts.length-1]};
}

/* charts */
function lineChart(pts,opts){
  opts=opts||{};const W=448,H=opts.h||188,padL=6,padR=6,padT=14,padB=20;
  const keys=opts.keys||["cash"];let lo=Infinity,hi=-Infinity;
  pts.forEach(p=>keys.forEach(k=>{lo=Math.min(lo,p[k]);hi=Math.max(hi,p[k])}));
  if(opts.includeZero){lo=Math.min(lo,0);hi=Math.max(hi,0)}if(lo===hi){hi+=1;lo-=1}
  const pad=(hi-lo)*0.12;hi+=pad;lo-=pad;
  const iw=W-padL-padR,ih=H-padT-padB;
  const X=i=>padL+iw*(i/(pts.length-1)),Y=v=>padT+ih*(1-(v-lo)/(hi-lo));
  const path=k=>{let d="";pts.forEach((p,i)=>{d+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(p[k]).toFixed(1)});return d};
  const area=k=>{let d="M"+X(0)+" "+Y(pts[0][k]);pts.forEach((p,i)=>{if(i)d+="L"+X(i).toFixed(1)+" "+Y(p[k]).toFixed(1)});
    d+="L"+X(pts.length-1)+" "+(padT+ih)+"L"+X(0)+" "+(padT+ih)+"Z";return d};
  let grid="",labels="";
  for(let i=0;i<pts.length;i++){const d=parseISO(pts[i].date);
    if(d.getDate()===1){const x=X(i).toFixed(1);
      grid+=`<line class="grid" x1="${x}" y1="${padT}" x2="${x}" y2="${padT+ih}" stroke-opacity=".55"/>`;
      if(d.getMonth()%(pts.length>200?2:1)===0||pts.length<95)
        labels+=`<text x="${x}" y="${H-6}" fill="var(--ink-3)" font-size="9.5" text-anchor="middle">${d.getMonth()+1}월</text>`;}}
  let zero="";if(lo<0&&hi>0){const zy=Y(0).toFixed(1);
    zero=`<line x1="${padL}" y1="${zy}" x2="${W-padR}" y2="${zy}" stroke="var(--neg)" stroke-dasharray="3 3" stroke-opacity=".6"/>`}
  const col={cash:"var(--accent)",net:"var(--gold)"};const fillId="g"+Math.random().toString(36).slice(2,6);
  let defs=`<linearGradient id="${fillId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".22"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient>`;
  let body="";if(keys.includes("cash"))body+=`<path d="${area('cash')}" fill="url(#${fillId})"/>`;
  keys.forEach(k=>{body+=`<path d="${path(k)}" fill="none" stroke="${col[k]}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`});
  keys.forEach(k=>{const i=pts.length-1;body+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(pts[i][k]).toFixed(1)}" r="3.6" fill="${col[k]}" stroke="var(--surface)" stroke-width="2"/>`});
  if(opts.mark){const mi=pts.findIndex(p=>p.date===opts.mark.date);
    if(mi>=0)body+=`<circle cx="${X(mi).toFixed(1)}" cy="${Y(pts[mi].cash).toFixed(1)}" r="3.4" fill="var(--neg)" stroke="var(--surface)" stroke-width="2"/>`}
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block"><defs>${defs}</defs>${grid}${zero}${body}${labels}</svg>`;
}
function sparkline(pts,key){
  const W=120,H=40;let lo=Infinity,hi=-Infinity;pts.forEach(p=>{lo=Math.min(lo,p[key]);hi=Math.max(hi,p[key])});if(lo===hi){hi++;lo--}
  const X=i=>W*(i/(pts.length-1)),Y=v=>H-2-((H-4)*(v-lo)/(hi-lo));
  let d="";pts.forEach((p,i)=>{d+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(p[key]).toFixed(1)});
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/></svg>`;
}

function pointAt(pts,iso){return pts.find(p=>p.date===iso)||pts[0]}
function monthNetFlow(){let n=0;const from=S.baseDate,to=toISO(addMonths(parseISO(from),1));
  for(const r of S.recurring){const sign=r.kind==="income"?1:-1;for(const o of occurrences(r,from,to))if(o.date>=from&&o.date<to)n+=sign*o.amount}
  for(const l of S.loans)for(const p of loanPayments(l,from,to))if(p.date>=from&&p.date<to)n-=p.amount;return n}
function upcomingEvents(days){const from=S.baseDate,to=addDaysISO(from,days);const out=[];
  for(const r of S.recurring){const sign=r.kind==="income"?1:-1;for(const o of occurrences(r,from,to))if(o.date>from&&o.date<=to)out.push({name:r.name,cat:r.cat,date:o.date,amount:sign*o.amount})}
  for(const o of S.oneoff)if(o.date>from&&o.date<=to)out.push({name:o.name,cat:o.cat,date:o.date,amount:(o.kind==="income"?1:-1)*o.amount});
  for(const l of S.loans)for(const p of loanPayments(l,from,to))if(p.date>from&&p.date<=to)out.push({name:l.name+" 상환",cat:"대출",date:p.date,amount:-p.amount});
  return out.sort((a,b)=>a.date<b.date?-1:1)}

/* FLOW */
function viewFlow(){
  const evs=upcomingEvents(90);const byDate={};evs.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e)});
  const dates=Object.keys(byDate).sort();let bal=S.baseCash;
  let html=`<div class="card" style="margin-top:12px"><div class="between">
    <div><div class="lbl">시작 잔액 · ${fmtDateShort(S.baseDate)}</div>
    <div class="mono" style="font-size:22px;font-weight:700;margin-top:2px">${won(S.baseCash)}</div></div>
    <div class="chip accent">향후 90일</div></div></div><div style="height:8px"></div>`;
  if(!dates.length)return html+`<div class="empty">향후 90일간 예정된 항목이 없습니다.</div>`;
  html+=dates.map(d=>{const list=byDate[d];const dayNet=list.reduce((a,e)=>a+e.amount,0);bal+=dayNet;const dd=parseISO(d);
    return `<div class="tl-day"><div class="tl-date"><div class="d mono">${dd.getDate()}</div><div class="m">${MON[dd.getMonth()]}</div></div>
      <div class="tl-line"><div class="tl-dot" style="background:${dayNet>=0?'var(--pos)':'var(--neg)'}"></div></div>
      <div class="tl-body">${list.map(e=>`<div class="tl-ev"><div class="row" style="gap:8px;min-width:0">
        <span>${catIcon(e.cat)}</span><span class="nm" style="font-size:13.5px;font-weight:600">${esc(e.name)}</span></div>
        <div class="mono ${e.amount>=0?'pos':'neg'}" style="font-weight:650;font-size:13.5px">${wonSigned(e.amount)}</div></div>`).join("")}
        <div class="tl-bal mono">잔액 ${won(bal)}</div></div></div>`;}).join("");
  return html+`<div style="height:6px"></div>`;
}

function estPayoff(l){if(l.rate>0&&l.payment<=l.principal*(l.rate/100/12))return "상환액 부족";
  let i=0;while(i<600){const iso=toISO(addMonths(parseISO(l.start),i));if(loanRemainingAt(l,iso)<=0){const d=parseISO(iso);return d.getFullYear()+"."+(d.getMonth()+1)+" 완납"}i++}return "장기"}

/* ESTATE — 부동산 예상차익 */
function profitShareRate(ltv,year){
  if(ltv===50){if(year<=9)return 20;if(year===10)return 18;if(year===11)return 16;if(year===12)return 14;if(year===13)return 12;return 10}
  if(ltv===40){if(year<=9)return 15;if(year===10)return 13;return 10}
  return 10;
}
function amortCum(P,annualRate,termYears,months){
  const i=annualRate/100/12,n=termYears*12,t=Math.min(months,n);
  if(i===0){const princ=Math.min(P/n*t,P);return{principal:princ,interest:0}}
  const pow=Math.pow(1+i,n),M=P*i*pow/(pow-1);let bal=P,cumP=0,cumI=0;
  for(let k=0;k<t;k++){const interest=bal*i;let princ=M-interest;if(princ>bal)princ=bal;bal-=princ;cumP+=princ;cumI+=interest;if(bal<=0)break}
  return{principal:cumP,interest:cumI,payment:M};
}
function estateCalc(){
  const r=S.realestate;const year=Math.max(1,Math.min(30,r.sellYear-r.baseYear+1));
  const share=profitShareRate(r.ltv,year);
  const loanPrincipal=Math.round(r.ltv/100*r.loanBase);
  const equity=r.acquire-loanPrincipal;
  const months=year*12;
  const am=amortCum(loanPrincipal,r.rate,r.term,months);
  const balance=Math.max(0,loanPrincipal-am.principal);
  const profit=r.salePrice-r.acquire;const shareAmt=Math.max(0,profit)*share/100;
  const realize=r.salePrice-balance-shareAmt;
  const grossGain=realize-equity;
  const netProfit=realize-equity-am.principal-am.interest;
  return{year,share,loanPrincipal,equity,cumP:am.principal,cumI:am.interest,balance,profit,shareAmt,realize,grossGain,netProfit};
}

function saveRec(rid){const name=v("f_name").trim(),amt=+v("f_amt")||0,freq=v("f_freq");

/* ===== PWA + Supabase 동기화 (공유코드 방식) ===== */
var CFG_KEY="moneyflow.cfg";
var CFG=null; try{CFG=JSON.parse(localStorage.getItem(CFG_KEY)||"null");}catch(e){}
var sb=null, localRev=+(localStorage.getItem("moneyflow.rev")||0), pushT=null, applying=false;
function cfgSave(){localStorage.setItem(CFG_KEY,JSON.stringify(CFG));}
function initSb(){ if(CFG&&CFG.url&&CFG.key&&window.supabase){ try{ sb=window.supabase.createClient(CFG.url,CFG.key); }catch(e){ console.warn(e); } } }
function syncDotSet(txt,cls){ var e=document.getElementById("syncDot"); if(e){ e.textContent=txt; e.className="syncdot "+(cls||""); } }
function ensureDot(){ var tb=document.getElementById("topbar"); if(tb&&!document.getElementById("syncDot")){ var b=document.createElement("button"); b.id="syncDot"; b.className="syncdot"; b.textContent="로컬"; b.onclick=openSyncSheet; tb.appendChild(b); } }
async function cloudPull(){ if(!sb)return null; try{ var r=await sb.from("households").select("data,rev,pass").eq("code",CFG.code).maybeSingle(); if(r.error){ console.warn(r.error); return null; } return r.data; }catch(e){ console.warn(e); return null; } }
async function cloudPush(){ if(!sb)return; localRev++; localStorage.setItem("moneyflow.rev",localRev); syncDotSet("동기화 중","saving"); try{ var r=await sb.from("households").upsert({code:CFG.code,pass:CFG.pass,data:S,rev:localRev,updated_at:new Date().toISOString()},{onConflict:"code"}); if(r.error){ syncDotSet("실패","err"); console.warn(r.error); } else { syncDotSet("동기화됨","ok"); } }catch(e){ syncDotSet("실패","err"); console.warn(e); } }
function schedulePush(){ if(!sb)return; clearTimeout(pushT); pushT=setTimeout(cloudPush,700); }
function subscribeRT(){ if(!sb)return; try{ sb.channel("hh-"+CFG.code).on("postgres_changes",{event:"*",schema:"public",table:"households",filter:"code=eq."+CFG.code},function(p){ var row=p.new; if(!row||row.rev<=localRev)return; applying=true; S=migrate(row.data); localRev=row.rev; localStorage.setItem("moneyflow.rev",localRev); localStorage.setItem(KEY,JSON.stringify(S)); render(); ensureDot(); applying=false; syncDotSet("동기화됨","ok"); toast("다른 기기에서 업데이트됨"); }).subscribe(); }catch(e){ console.warn(e); } }
function randCode(){ var s="HH-", a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789", i; for(i=0;i<16;i++){ s+=a[Math.floor(Math.random()*a.length)]; if(i===7)s+="-"; } return s; }
function gv(id){ var e=document.getElementById(id); return e?e.value.trim():""; }
function GATE_HTML(){ return `
  <div style="max-width:480px;margin:0 auto;padding:30px 18px 44px;min-height:100%">
    <div style="text-align:center;margin:14px 0 22px">
      <div style="font-size:42px">💸</div>
      <h1 style="font-size:24px;margin-top:6px">머니플로우</h1>

    </div>

      <div class="lbl" style="margin-bottom:10px">1. Supabase 연결 정보</div>
      <div class="field"><label>Project URL</label><input id="g_url" placeholder="https://xxxx.supabase.co" value="${CFG&&CFG.url?esc(CFG.url):''}"></div>

      <div class="hint">Supabase 프로젝트 → Settings → API 에서 복사. 두 폰에 같은 값을 넣습니다.</div>
    </div>
    <div class="card">
      <div class="lbl" style="margin-bottom:10px">2. 가구 연결</div>

      </div>
      <div id="gm_join" style="margin-top:14px;display:none">
        <div class="field"><label>가구 코드</label><input id="gj_code" class="mono" placeholder="HH-XXXXXXXX-XXXXXXXX"></div>
        <div class="field"><label>패스코드</label><input id="gj_pass"></div>
        <button class="btn" onclick="doJoin()">가구 연결하고 불러오기</button>
        <div class="hint">배우자가 만든 가구 코드와 패스코드를 입력하면 같은 데이터를 봅니다.</div>
      </div>
    </div>
    <div class="empty">데이터는 Supabase에 저장되고, 각 기기에도 백업됩니다.</div>
  </div>`; }
function gate(){ var g=document.getElementById("gateEl"); if(g)g.remove(); var el=document.createElement("div"); el.id="gateEl"; el.className="gate"; el.innerHTML=GATE_HTML(); document.body.appendChild(el); }
function gateClose(){ var g=document.getElementById("gateEl"); if(g)g.remove(); }
function gateMode(m){ var n=document.getElementById("gm_new"), j=document.getElementById("gm_join"); if(n)n.style.display=(m==="new")?"block":"none"; if(j)j.style.display=(m==="join")?"block":"none"; var bs=document.querySelectorAll("#gateSeg button"); bs.forEach(function(b){ b.classList.toggle("on", b.getAttribute("data-m")===m); }); }
async function doCreate(){ var url=gv("g_url"), key=gv("g_key"), code=gv("gn_code"), pass=gv("gn_pass"); if(!url||!key){ alert("Supabase URL과 anon key를 입력하세요."); return; } if(!code){ alert("가구 코드를 생성하세요."); return; } CFG={url:url,key:key,code:code,pass:pass}; cfgSave(); initSb(); if(!sb){ alert("Supabase 연결 실패. URL/key를 확인하세요."); return; } await cloudPush(); subscribeRT(); gateClose(); ensureDot(); syncDotSet("동기화됨","ok"); toast("가구 생성 완료"); }
async function doJoin(){ var url=gv("g_url"), key=gv("g_key"), code=gv("gj_code"), pass=gv("gj_pass"); if(!url||!key||!code){ alert("URL, key, 가구 코드를 모두 입력하세요."); return; } CFG={url:url,key:key,code:code,pass:pass}; initSb(); if(!sb){ alert("Supabase 연결 실패. URL/key를 확인하세요."); return; } var row=await cloudPull(); if(!row){ alert("해당 가구 코드를 찾을 수 없습니다. 코드와 URL을 확인하세요."); sb=null; return; } if((row.pass||"")!==(pass||"")){ alert("패스코드가 일치하지 않습니다."); sb=null; return; } cfgSave(); applying=true; S=migrate(row.data); localRev=row.rev; localStorage.setItem("moneyflow.rev",localRev); localStorage.setItem(KEY,JSON.stringify(S)); render(); ensureDot(); applying=false; subscribeRT(); gateClose(); syncDotSet("동기화됨","ok"); toast("가구 연결 완료"); }
function openSyncSheet(){ if(!CFG||!sb){ gate(); return; } openSheet(`<h2>가구 동기화</h2>
  <div class="field"><label>우리 가구 코드</label><input class="mono" readonly value="${esc(CFG.code)}"></div>
  <div class="hint" style="margin-bottom:14px">이 코드와 패스코드를 배우자 폰의 '기존 가구 연결'에 입력하면 같은 화면을 봅니다.</div>
  <button class="btn" onclick="cloudPush();closeSheet();toast('동기화 요청됨')">지금 강제 동기화</button>
  <button class="btn ghost" onclick="closeSheet()">닫기</button>
  <button class="btn danger" onclick="if(confirm('이 기기에서 연결을 해제할까요? 데이터는 클라우드에 남습니다.')){localStorage.removeItem(CFG_KEY);location.reload();}">이 기기 연결 해제</button>`); }

/* ---- 초기화 ---- */
ensureDot();
if(!CFG||!CFG.url||!CFG.code){ syncDotSet("연결 필요","err"); gate(); }
else { initSb(); if(sb){ subscribeRT(); syncDotSet("동기화 중","saving"); cloudPull().then(function(row){ if(row){ if(row.rev>=localRev){ applying=true; S=migrate(row.data); localRev=row.rev; localStorage.setItem("moneyflow.rev",localRev); localStorage.setItem(KEY,JSON.stringify(S)); applying=false; render(); ensureDot(); } syncDotSet("동기화됨","ok"); } else { cloudPush(); } }); } else { syncDotSet("연결 필요","err"); gate(); } }
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("./sw.js").catch(function(){}); }); }

</script>
